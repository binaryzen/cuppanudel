<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cuppanudel POC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: monospace;
            background: #111;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            gap: 2rem;
        }

        @media (min-width: 480px) {
            body { padding: 2rem; }
        }

        button {
            font-family: monospace;
            font-size: 0.9rem;
            padding: 0.4rem 1rem;
            cursor: pointer;
            background: #222;
            color: #eee;
            border: 1px solid #444;
        }

        @media (max-width: 479px) {
            button { padding: 0.6rem 1rem; }
            .fine-btn { padding: 0.35rem 0.5rem; }
        }
        button:disabled { opacity: 0.4; cursor: default; }
        button:hover:not(:disabled) { background: #333; }
        button.danger { border-color: #933; color: #f88; }
        button.danger:hover:not(:disabled) { background: #311; }
        button.active { background: #900; border-color: #f44; color: #fff; }

        label.dim { color: #666; font-size: 0.75rem; letter-spacing: 0.1em; }

        /* ── app header ── */
        #app-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            max-width: 420px;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #444;
        }
        #app-title {
            flex: 1;
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 0.05em;
        }
        #version-str { color: #4fc; }

        /* ── hamburger ── */
        #hamburger-wrap { position: relative; }
        #hamburger-btn { padding: 0.2rem 0.5rem; font-size: 1.1rem; line-height: 1; }
        #hamburger-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 4px);
            background: #1a1a1a;
            border: 1px solid #333;
            z-index: 200;
            display: flex;
            flex-direction: column;
            min-width: 160px;
        }
        #hamburger-menu button {
            text-align: left;
            border: none;
            border-bottom: 1px solid #222;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
        }
        #hamburger-menu button:last-child { border-bottom: none; }

        /* ── peak meter ── */
        #peak-meter {
            width: 100%;
            max-width: 420px;
            height: 24px;
            display: block;
        }

        /* ── sample browser ── */
        #sample-browser {
            width: 100%;
            max-width: 420px;
            border: 1px solid #333;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        #sample-browser h2 { font-size: 0.85rem; letter-spacing: 0.15em; color: #888; }

        .row { display: flex; align-items: center; gap: 0.75rem; }

        input[type=range] { flex: 1; accent-color: #4fc; }
        input[type=range]:disabled { opacity: 0.4; }

        #ring-controls { display: flex; align-items: center; gap: 0.75rem; }
        #ring-controls.hidden { display: none; }

        #record-btn { min-width: 90px; }
        button.playing { background: #040; border-color: #4f4; color: #4fc; }

        /* ── sample list ── */
        #sample-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            max-height: 300px;
            overflow-y: auto;
        }
        #sample-list li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.5rem;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
        }
        .clip-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.9rem;
        }
        .clip-thumb { flex-shrink: 0; display: block; background: #0a0a0a; }
        .clip-duration { color: #666; font-size: 0.8rem; min-width: 4ch; text-align: right; }
        .clip-actions { display: flex; gap: 0.3rem; }
        .clip-actions button { padding: 0.2rem 0.5rem; font-size: 0.75rem; }

        #empty-msg { color: #444; font-size: 0.85rem; text-align: center; padding: 1rem 0; }

        /* ── metronome ── */
        #metro-panel {
            width: 100%;
            max-width: 420px;
            border: 1px solid #333;
            padding: 0.75rem 10px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        #metro-panel h2 { font-size: 0.85rem; letter-spacing: 0.15em; color: #888; }
        .metro-top { display: flex; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .metro-ctrl-grp {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }
        .knob-fine { display: flex; align-items: center; gap: 0.2rem; }
        .knob-fine span { min-width: 3ch; text-align: center; font-size: 0.75rem; color: #888; }
        .fine-btn { padding: 0.1rem 0.35rem; font-size: 0.8rem; min-width: 0; }
        #metro-btn { min-width: 0; padding: 0.2rem 0.5rem; line-height: 1; }
        #beat-grid {
            display: block;
            background: #0a0a0a;
            border: 1px solid #222;
            cursor: default;
            max-width: 100%;
        }

        /* ── collapsible sections ── */
        .collapsible-header {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.15rem 0;
            user-select: none;
        }
        .collapse-btn {
            padding: 0 0.3rem;
            font-size: 0.85rem;
            min-width: 0;
            line-height: 1;
            color: #555;
            border-color: transparent;
            background: none;
        }
        .collapse-btn:hover:not(:disabled) { color: #aaa; background: none; border-color: transparent; }
        .collapsible-body.collapsed { display: none; }

        /* ── metro fullscreen ── */
        #metro-panel.fullscreen {
            position: fixed;
            inset: 0;
            z-index: 100;
            width: 100%;
            max-width: none;
            background: #111;
            padding: 1rem;
            overflow-y: auto;
            border: none;
        }

        #metro-header {
            display: flex;
            align-items: center;
        }
        #metro-header h2 { flex: 1; }

        #metro-expand-btn {
            font-size: 1rem;
            padding: 0.1rem 0.4rem;
            line-height: 1;
        }

        #metro-restore-btn {
            display: none;
        }

        #metro-panel.fullscreen #metro-restore-btn,
        #metro-panel:fullscreen #metro-restore-btn {
            display: inline-block;
        }

        #metro-panel.fullscreen #metro-expand-btn,
        #metro-panel:fullscreen #metro-expand-btn {
            display: none;
        }

        #metro-panel:fullscreen {
            background: #111;
            padding: 1rem;
            overflow-y: auto;
        }

        /* ── tuner ── */
        #tuner {
            width: 100%;
            max-width: 420px;
            height: 68px;
            background: #0a0a0a;
            border: 1px solid #333;
            display: block;
        }

        /* ── waveform ── */
        #waveform {
            width: 100%;
            max-width: 420px;
            height: 120px;
            background: #0a0a0a;
            border: 1px solid #333;
            display: block;
        }

        /* ── visualizer panel wrapper ── */
        .viz-panel {
            width: 100%;
            max-width: 420px;
        }

        /* ── shared panel header ── */
        .panel-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }
        .panel-header > *:first-child { flex: 1; }

        .settings-btn {
            padding: 0.1rem 0.35rem;
            font-size: 0.75rem;
            min-width: 0;
            color: #888;
            border-color: #333;
            letter-spacing: 0;
        }
        .settings-btn:hover:not(:disabled) { color: #eee; border-color: #666; background: #333; }

        /* ── preset bank ── */
        .preset-bank { display: flex; flex-direction: column; gap: 0.35rem; }
        .preset-actions { display: flex; gap: 0.35rem; }
        .preset-slots   { display: flex; gap: 0.25rem; flex-wrap: wrap; }

        .preset-action {
            min-width: 2.8rem;
            padding: 0.3rem 0.4rem;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .preset-action.armed {
            background: #440;
            border-color: #cc8;
            color: #ffc;
        }

        .preset-slot {
            min-width: 2.5rem;
            padding: 0.25rem 0.3rem;
            font-size: 0.75rem;
            position: relative;
        }
        .preset-slot.awaiting { border-color: #c84; color: #fa8; }

        /* LED dot: dim = empty, bright = has preset */
        .preset-slot::after {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #333;
            margin-left: 3px;
            vertical-align: middle;
        }
        .preset-slot.has-preset::after {
            background: #4fc;
            box-shadow: 0 0 5px #4fc;
        }
    </style>
</head>
<body>
    <header id="app-header">
        <span id="app-title">cuppanudel&nbsp;<span id="version-str"></span></span>
        <button id="start-btn">Start</button>
        <div id="hamburger-wrap">
            <button id="hamburger-btn" title="Menu">≡</button>
            <div id="hamburger-menu" hidden>
                <button id="export-workspace-btn">Export Workspace</button>
                <button id="copy-workspace-btn">Copy YAML</button>
            </div>
        </div>
    </header>

    <section class="viz-panel">
        <div class="panel-header">
            <label class="dim">LEVEL</label>
            <button class="settings-btn" id="peak-settings-btn">[...]</button>
        </div>
        <canvas id="peak-meter" width="420" height="24"></canvas>
    </section>

    <section class="viz-panel">
        <div class="panel-header">
            <label class="dim">TUNER</label>
            <button class="settings-btn" id="tuner-settings-btn">[...]</button>
        </div>
        <canvas id="tuner" width="420" height="68"></canvas>
    </section>

    <section class="viz-panel">
        <div class="panel-header">
            <label class="dim">WAVEFORM</label>
            <button class="settings-btn" id="waveform-settings-btn">[...]</button>
        </div>
        <canvas id="waveform" width="420" height="120"></canvas>
    </section>

    <section id="metro-panel">
        <div id="metro-header" class="panel-header">
            <h2>METRONOME</h2>
            <button class="settings-btn" id="metro-settings-btn">[...]</button>
            <button id="metro-expand-btn" title="Fullscreen">⛶</button>
            <button id="metro-restore-btn">✕ Restore</button>
            <button id="metro-btn" disabled>▶</button>
        </div>

        <div class="collapsible-header">
            <span class="dim">CONTROLS</span>
            <button class="collapse-btn" id="metro-controls-toggle">▾</button>
        </div>
        <div class="collapsible-body" id="metro-controls-body">
            <div class="metro-top">
                <div class="metro-ctrl-grp">
                    <span class="dim">BPM</span>
                    <canvas id="bpm-knob" width="40" height="40"></canvas>
                    <div class="knob-fine">
                        <button class="fine-btn" id="bpm-dec">−</button>
                        <span id="bpm-val">120</span>
                        <button class="fine-btn" id="bpm-inc">+</button>
                    </div>
                </div>
                <div class="metro-ctrl-grp">
                    <span class="dim">BEATS</span>
                    <canvas id="beats-knob" width="40" height="40"></canvas>
                    <div class="knob-fine">
                        <button class="fine-btn" id="beats-dec">−</button>
                        <span id="beats-val">4</span>
                        <button class="fine-btn" id="beats-inc">+</button>
                    </div>
                </div>
                <div class="metro-ctrl-grp">
                    <span class="dim">VIS DELAY</span>
                    <canvas id="delay-knob" width="40" height="40"></canvas>
                    <div class="knob-fine">
                        <button class="fine-btn" id="delay-dec">−</button>
                        <span id="delay-val">0ms</span>
                        <button class="fine-btn" id="delay-inc">+</button>
                    </div>
                </div>
                <div class="metro-ctrl-grp">
                    <span class="dim">SNAP</span>
                    <canvas id="snap-knob" width="40" height="40"></canvas>
                    <div class="knob-fine">
                        <button class="fine-btn" id="snap-dec">−</button>
                        <span id="snap-val">3</span>
                        <button class="fine-btn" id="snap-inc">+</button>
                    </div>
                </div>
                <div class="metro-ctrl-grp">
                    <span class="dim">MIC LAT</span>
                    <canvas id="lat-knob" width="40" height="40"></canvas>
                    <div class="knob-fine">
                        <button class="fine-btn" id="lat-dec">−</button>
                        <span id="lat-val">0ms</span>
                        <button class="fine-btn" id="lat-inc">+</button>
                    </div>
                </div>
                <div class="metro-ctrl-grp">
                    <span class="dim">STRIDE</span>
                    <canvas id="stride-knob" width="40" height="40"></canvas>
                    <div class="knob-fine">
                        <button class="fine-btn" id="stride-dec">−</button>
                        <span id="stride-val">1</span>
                        <button class="fine-btn" id="stride-inc">+</button>
                    </div>
                </div>
            </div>
            <!-- sample-set-picker-container inserted here by main.js -->
        </div>

        <canvas id="beat-grid" width="400" height="68"></canvas>

        <div class="collapsible-header">
            <span class="dim">PRESETS</span>
            <button class="collapse-btn" id="metro-presets-toggle">▾</button>
        </div>
        <div class="collapsible-body" id="metro-presets-body">
            <div id="preset-bank-container"></div>
        </div>
    </section>

    <section id="sample-browser-panel">
        <h2>SAMPLE BROWSER</h2>

        <div class="row">
            <label><input type="radio" name="rec-mode" value="dynamic" checked> Dynamic</label>
            <label><input type="radio" name="rec-mode" value="fixed"> Fixed</label>
        </div>

        <div id="ring-controls" class="hidden">
            <label class="dim">LEN</label>
            <input type="range" id="ring-duration" min="500" max="30000" step="500" value="5000">
            <span id="ring-duration-label" style="min-width:5ch">5000ms</span>
        </div>

        <div class="row">
            <button id="record-btn" disabled>Record</button>
            <span id="rec-status" style="color:#666; font-size:0.8rem"></span>
        </div>

        <!-- File import UI (lane-d) -->
        <input type="file" id="import-file-input" accept="audio/*" multiple style="display:none">
        <button id="import-file-btn">Import File</button>
        <div id="import-drop-overlay" hidden></div>

        <ul id="sample-list">
            <li id="empty-msg">No samples</li>
        </ul>
    </section>

    <script src="lib/js-yaml.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
